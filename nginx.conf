server {
    listen 80;
    server_name ton-domaine.com www.ton-domaine.com;

    root /var/www/quran-app;
    index index.html;

    # Compression Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Fichiers statiques avec cache long
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker (NE PAS cacher — doit toujours être à jour)
    location /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        access_log off;
    }

    # Manifest
    location /manifest.json {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Icônes PWA
    location ~* \.(png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/quran-app.access.log;
    error_log /var/log/nginx/quran-app.error.log;
}
